<!DOCTYPE html>
<html lang="zh-CN" data-theme="aurora">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>🎵 Bandstand</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Orbitron:wght@700;900&display=swap"
    rel="stylesheet" />
  <!-- CSS -->
  <link rel="stylesheet" href="/public/css/variables.css">
  <link rel="stylesheet" href="/public/css/base.css">
  <link rel="stylesheet" href="/public/css/header.css">
  <link rel="stylesheet" href="/public/css/main.css">
  <link rel="stylesheet" href="/public/css/button.css">
  <link rel="stylesheet" href="/public/css/search.css">
  <link rel="stylesheet" href="/public/css/hotlist.css">
  <link rel="stylesheet" href="/public/css/queue.css">
  <link rel="stylesheet" href="/public/css/player.css">
  <link rel="stylesheet" href="/public/css/lyric.css">
  <link rel="stylesheet" href="/public/css/modal.css">
  <link rel="stylesheet" href="/public/css/log.css">
  <link rel="stylesheet" href="/public/css/room.css">
  <link rel="stylesheet" href="/public/css/mobile.css">
  <!-- Three.js CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>

<body>
  <canvas id="bg-canvas"></canvas>
  <canvas id="cosmos-canvas" style="display:none"></canvas>

  <header>
    <div class="logo">🎵 Bandstand</div>
    <div class="hstatus header-controls">
      <!-- 房间信息（由 room.js 动态注入） -->
      <span id="oc">0</span> 人在线
      <button class="theme-btn" id="btn-theme" onclick="toggleTheme()">🎨 <span class="theme-name"
          id="theme-name">极光</span></button>
      <button class="btn-hdr" id="btn-bg" onclick="toggleBg()" title="切换背景动画">🌌 星球</button>
      <button class="btn-hdr" id="btn-adm" onclick="openAdminModal()">管理员</button>
      <button class="btn-hdr on" id="btn-logout" onclick="adminLogout()" style="display:none">退出管理</button>
    </div>
  </header>

  <main>
    <!-- 左列：热门推荐 -->
    <div>
      <div class="card">
        <div class="ch">
          <div class="ch-l"><span>🔥</span> 热门推荐</div>
          <div class="hot-tabs">
            <button class="htab active" data-type="hot" onclick="loadHotList('hot',this)">热歌榜</button>
            <button class="htab" data-type="new" onclick="loadHotList('new',this)">新歌榜</button>
            <button class="htab" data-type="surge" onclick="loadHotList('surge',this)">飙升榜</button>
          </div>
        </div>
        <div id="hot-list">
          <div class="tip">
            <div class="spin"></div>加载中…
          </div>
        </div>
      </div>
    </div>

    <!-- 中列：搜索点歌 -->
    <div>
      <div class="card">
        <div class="ch">
          <div class="ch-l"><span>🔍</span> 搜索点歌</div>
          <div class="stabs" id="stabs">
            <button class="stab active" data-tab="native" onclick="switchSearchTab('native',this)">音乐搜索</button>
            <button class="stab" data-tab="agg" onclick="switchSearchTab('agg',this)">聚合搜索</button>
          </div>
        </div>
        <div class="nk-row">昵称：<input class="nk-inp" id="nk" placeholder="输入昵称" maxlength="12" /></div>
        <div class="src-row">
          <input class="src-inp" id="si" placeholder="输入歌名 / 歌手名…" autocomplete="off" />
          <div class="src-filter" id="src-filter">
            <button class="src-opt active" data-src="all">全部</button>
            <button class="src-opt" data-src="nc">网易云</button>
            <button class="src-opt" data-src="qq">QQ音乐</button>
          </div>
          <button class="btn btn-p" onclick="doSearch()" id="btn-search">搜 索</button>
        </div>
        <div id="search-results">
          <div class="tip">搜索歌曲后在这里点歌 🎶</div>
        </div>
      </div>
    </div>

    <!-- 右列：播放队列 -->
    <div>
      <div class="card">
        <div class="ch">
          <div class="ch-l"><span>📋</span> 播放队列
            <span id="qc"
              style="background:var(--surface2);border-radius:12px;padding:1px 8px;font-size:.75rem;">0</span>
          </div>
          <button class="btn btn-d btn-sm ao" onclick="clearQueue()" style="display:none">清空</button>
        </div>
        <div id="queue-list">
          <div class="qempty">
            <div class="bi">🎧</div>队列空空如也<br />快去搜索点歌吧！
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="pbar">
    <div class="pi">
      <img id="pc" class="pcover" src="" alt="封面"
        onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 50 50%22><rect width=%2250%22 height=%2250%22 fill=%22%23181c2e%22/><text x=%2225%22 y=%2232%22 text-anchor=%22middle%22 font-size=%2222%22>🎵</text></svg>'" />
      <div class="pinfo">
        <div class="pinfo-left">
          <div class="pname" id="pn">暂无播放</div>
          <div class="partist" id="pa">—</div>
        </div>
        <div class="plyrics" onclick="openLyricModal()" style="cursor:pointer" id="plyrics-wrap">
          <div class="lyric-line lyric-cur" id="lyric-cur"></div>
          <div class="lyric-line lyric-next" id="lyric-next"></div>
          <div class="lyric-expand-tip" id="lyric-expand-tip">点击展开歌词 ↗</div>
        </div>
      </div>
      <div class="pw">
        <span class="pt" id="tc">0:00</span>
        <div class="pb" onclick="seekTo(event)">
          <div class="pf" id="pf"></div>
        </div>
        <span class="pt" id="tt">0:00</span>
      </div>
      <div class="pctrl">
        <div class="vol-wrap">
          <span class="vol-icon" id="vol-icon" onclick="toggleMute()">🔊</span>
          <input type="range" class="vol-slider" id="vol-slider" min="0" max="100" value="80"
            oninput="setVolume(this.value)" />
        </div>
        <button class="cbtn pbtn ao" id="btn-play" onclick="togglePlay()">▶</button>
        <button class="cbtn ao" onclick="nextSong()">⏭</button>
      </div>
    </div>
  </div>

  <div id="tw"></div>

  <div class="ov" id="adm-modal" style="display:none" onclick="if(event.target===this)closeAdminModal()">
    <div class="mb">
      <h3>🔐 管理员验证</h3>
      <input class="mi" id="apwd" type="password" placeholder="输入管理员密码"
        onkeydown="if(event.key==='Enter')submitAdmin()" />
      <div class="ma">
        <button class="btn-g" onclick="closeAdminModal()">取消</button>
        <button class="btn btn-p" onclick="submitAdmin()">确认</button>
      </div>
    </div>
  </div>

  <!-- 歌词全屏弹窗 -->
  <div class="lyric-modal" id="lyric-modal" onclick="if(event.target===this)closeLyricModal()">
    <div class="lyric-modal-hd">
      <img id="lyric-modal-cover" class="lyric-modal-cover" src=""
        onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 64 64%22><rect width=%2264%22 height=%2264%22 fill=%22%23181c2e%22/><text x=%2232%22 y=%2240%22 text-anchor=%22middle%22 font-size=%2228%22>🎵</text></svg>'" />
      <div class="lyric-modal-info">
        <div class="lyric-modal-name" id="lyric-modal-name">暂无播放</div>
        <div class="lyric-modal-artist" id="lyric-modal-artist">—</div>
      </div>
      <button class="lyric-modal-close" onclick="closeLyricModal()">✕</button>
    </div>
    <div class="lyric-modal-body" id="lyric-modal-body"></div>
    <div class="lyric-modal-bar">
      <span class="pt" id="lm-tc">0:00</span>
      <div class="pb" onclick="lyricSeekTo(event)">
        <div class="pf" id="lm-pf"></div>
      </div>
      <span class="pt" id="lm-tt">0:00</span>
    </div>
    <div class="lyric-bar-tip"></div>
  </div>

  <!-- 操作日志按钮 + 面板 -->
  <button class="log-fab" id="log-fab" onclick="toggleLogPanel()">📋<span class="log-badge"
      id="log-badge">0</span></button>
  <div class="log-panel" id="log-panel">
    <div class="log-panel-header">
      <span>📋 操作记录</span>
      <button class="log-panel-close" onclick="toggleLogPanel()">✕</button>
    </div>
    <div class="log-list" id="log-list">
      <div class="log-empty">暂无记录</div>
    </div>
  </div>

  <audio id="ap" preload="auto"></audio>
  <canvas id="lyric-fly-canvas"
    style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;"></canvas>
  <canvas id="click-canvas"
    style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;"></canvas>

  <!-- JS（按依赖顺序加载） -->
  <script src="/socket.io/socket.io.js"></script>
  <script src="/public/js/utils.js"></script>
  <script src="/public/js/api.js"></script>
  <script src="/public/js/auth.js?v=2"></script>
  <script src="/public/js/socket.js"></script>
  <script src="/public/js/room.js"></script>
  <script src="/public/js/state.js"></script>
  <script src="/public/js/log.js"></script>
  <script src="/public/js/search.js"></script>
  <script src="/public/js/hotlist.js"></script>
  <script src="/public/js/queue.js"></script>
  <script src="/public/js/lyric.js"></script>
  <script src="/public/js/player.js"></script>
  <script src="/public/js/admin.js"></script>
  <script src="/public/js/theme.js"></script>
  <script src="/public/js/visualizer.js"></script>
  <script src="/public/js/cosmos.js"></script>
  <script src="/public/js/lyric-fly.js"></script>
  <script src="/public/js/click-burst.js"></script>

  <!-- 页面初始化：加入房间 -->
  <script>
    // ── 背景模式切换 ──
    let bgMode = localStorage.getItem('jk_bg') || 'planet'; // planet | cosmos
    const BG_LABELS = { planet: '🌌 星球', cosmos: '🌀 宇宙' };

    function toggleBg() {
      const newMode = bgMode === 'planet' ? 'cosmos' : 'planet';
      applyBgMode(newMode);
    }

    function applyBgMode(mode) {
      bgMode = mode;
      localStorage.setItem('jk_bg', mode);
      const btn = document.getElementById('btn-bg');
      if (btn) btn.textContent = BG_LABELS[mode];
      const bgCanvas = document.getElementById('bg-canvas');
      const cosmosCanvas = document.getElementById('cosmos-canvas');
      if (mode === 'cosmos') {
        if (bgCanvas) bgCanvas.style.display = 'none';
        if (cosmosCanvas) cosmosCanvas.style.display = 'block';
        // 通知 cosmos 开始动画（第一次启动）
        if (window._cosmos) window._cosmos.start();
      } else {
        if (bgCanvas) bgCanvas.style.display = 'block';
        if (cosmosCanvas) cosmosCanvas.style.display = 'none';
        // 通知 cosmos 暂停（省性能）
        if (window._cosmos) window._cosmos.stop();
      }
    }

    // 初始应用
    document.getElementById('btn-bg').textContent = BG_LABELS[bgMode];
    if (bgMode === 'cosmos') {
      // 等脚本全部加载完再切换
      setTimeout(function() { applyBgMode('cosmos'); }, 100);
    }

    // 页面加载后自动加入房间
    document.addEventListener('DOMContentLoaded', function() {
      // 初始化房间 UI
      RoomManager.initUI();

      // 设置昵称输入框
      var nick = RoomManager.getNickname();
      if (nick) {
        var nk = document.getElementById('nk');
        if (nk && !nk.value.trim()) nk.value = nick;
        localStorage.setItem('jk_nick', nick);
      }

      // 加入房间，成功后初始化状态
      RoomManager.join(function(data) {
        RoomManager.updateTag();
        RoomManager.onOwnerChanged(function() {
          // 房主转让后刷新 UI
          RoomManager.updateTag();
          adminShowControls();
        });
        // 如果是管理员，显示控制按钮
        if (data.isAdmin) adminShowControls();
      });
    });
  </script>
</body>

</html>
