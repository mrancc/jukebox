<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>🎵 Bandstand</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Orbitron:wght@700;900&display=swap"
    rel="stylesheet" />
  <style>
    /* ── 默认主题：Cyber（赛博朋克） ── */
    :root,
    [data-theme="cyber"] {
      --bg: #0a0c14;
      --bg-rgb: 10, 12, 20;
      --surface: #111420;
      --surface2: #181c2e;
      --border: #1f2540;
      --accent: #7c5cfc;
      --accent2: #fc5c7d;
      --accent3: #43e97b;
      --accent-rgb: 124, 92, 252;
      --accent2-rgb: 252, 92, 125;
      --text: #e8eaf6;
      --text2: #8b90b8;
      --glow: 0 0 20px rgba(124, 92, 252, 0.4);
      --r: 12px;
      --t: .25s ease;
      --hot-active: #e72d2d;
      --hot-active-bg: rgba(231, 45, 45, .1);
      --qq-color: #31c27c;
      --nc-color: #e72d2d;
    }

    /* ── Aurora 极光主题 ── */
    [data-theme="aurora"] {
      --bg: #09090b;
      --bg-rgb: 9, 9, 11;
      --surface: #111113;
      --surface2: #1a1a1e;
      --border: #27272a;
      --accent: #818cf8;
      --accent2: #f472b6;
      --accent3: #34d399;
      --accent-rgb: 129, 140, 248;
      --accent2-rgb: 244, 114, 182;
      --text: #fafafa;
      --text2: #71717a;
      --glow: 0 0 20px rgba(129, 140, 248, 0.25);
      --r: 14px;
      --t: .25s ease;
      --hot-active: #ef4444;
      --hot-active-bg: rgba(239, 68, 68, .1);
      --qq-color: #34d399;
      --nc-color: #ef4444;
    }

    /* ── Sakura 樱花主题 ── */
    [data-theme="sakura"] {
      --bg: #0f0b0e;
      --bg-rgb: 15, 11, 14;
      --surface: #1a1518;
      --surface2: #241e22;
      --border: #3a3036;
      --accent: #f9a8d4;
      --accent2: #c084fc;
      --accent3: #86efac;
      --accent-rgb: 249, 168, 212;
      --accent2-rgb: 192, 132, 252;
      --text: #fdf2f8;
      --text2: #a88a99;
      --glow: 0 0 24px rgba(249, 168, 212, 0.3);
      --r: 16px;
      --t: .25s ease;
      --hot-active: #f43f5e;
      --hot-active-bg: rgba(244, 63, 94, .1);
      --qq-color: #86efac;
      --nc-color: #f43f5e;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans SC', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(var(--bg-rgb), .9);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.2rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hstatus {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: .78rem;
      color: var(--text2);
      margin-left: auto;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent3);
      box-shadow: 0 0 8px var(--accent3);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .4
      }
    }

    .btn-hdr {
      background: none;
      border: 1px solid var(--border);
      color: var(--text2);
      border-radius: 6px;
      padding: 5px 12px;
      font-size: .78rem;
      cursor: pointer;
      transition: var(--t);
      font-family: inherit;
    }

    .btn-hdr:hover,
    .btn-hdr.on {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* 主题切换按钮 */
    .theme-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text2);
      border-radius: 6px;
      padding: 5px 10px;
      font-size: .78rem;
      cursor: pointer;
      transition: var(--t);
      font-family: inherit;
      white-space: nowrap;
    }

    .theme-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .theme-btn .theme-icon {
      margin-right: 4px;
    }

    .theme-btn .theme-name {
      font-size: .72rem;
    }

    @media(max-width:600px) {
      .theme-btn .theme-name {
        display: none;
      }
    }

    main {
      position: relative;
      z-index: 1;
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px 16px 130px;
      display: grid;
      grid-template-columns: 340px 1fr 380px;
      gap: 20px;
    }

    @media (max-width: 1100px) {
      main {
        grid-template-columns: 1fr 1fr;
      }

      main>div:first-child {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 720px) {
      main {
        grid-template-columns: 1fr;
      }

      main>div:first-child {
        grid-column: auto;
      }
    }

    @media(max-width:768px) {
      main {
        grid-template-columns: 1fr;
        padding-bottom: 210px;
      }
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
    }

    .ch {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: .82rem;
      font-weight: 500;
      color: var(--text2);
      letter-spacing: .05em;
      text-transform: uppercase;
    }

    .ch-l {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nk-row {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: .82rem;
      color: var(--text2);
    }

    .nk-inp {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 10px;
      color: var(--text);
      font-size: .82rem;
      font-family: inherit;
      outline: none;
      width: 110px;
      transition: var(--t);
    }

    .nk-inp:focus {
      border-color: var(--accent);
    }

    .src-row {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }

    .src-filter {
      display: flex;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .src-opt {
      background: var(--surface2);
      color: var(--text2);
      border: none;
      padding: 6px 12px;
      font-size: .78rem;
      cursor: pointer;
      transition: var(--t);
      white-space: nowrap;
    }

    .src-opt+.src-opt {
      border-left: 1px solid var(--border);
    }

    .src-opt:hover {
      color: var(--text1);
      background: var(--surface3);
    }

    .src-opt.active {
      background: var(--accent);
      color: #fff;
    }

    .src-opt.active[data-src="nc"] {
      background: var(--nc-color);
    }

    .src-opt.active[data-src="qq"] {
      background: var(--qq-color);
    }

    /* 搜索 Tab 切换 */
    .stabs {
      display: flex;
      gap: 0;
      margin-left: auto;
    }

    .stab {
      background: none;
      border: none;
      color: var(--text2);
      padding: 4px 12px;
      font-size: .75rem;
      cursor: pointer;
      border-radius: 6px;
      transition: var(--t);
    }

    .stab:hover {
      color: var(--text1);
      background: var(--surface2);
    }

    .stab.active {
      color: var(--accent);
      background: rgba(var(--accent-rgb), .1);
    }

    .src-inp {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-size: .9rem;
      font-family: inherit;
      outline: none;
      transition: var(--t);
    }

    .src-inp:focus {
      border-color: var(--accent);
      box-shadow: var(--glow);
    }

    .src-inp::placeholder {
      color: var(--text2);
    }

    .btn {
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: .85rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--t);
      font-family: inherit;
      white-space: nowrap;
    }

    .btn-p {
      background: var(--accent);
      color: #fff;
    }

    .btn-p:hover {
      filter: brightness(1.15);
      box-shadow: var(--glow);
    }

    .btn-d {
      background: rgba(var(--accent2-rgb), .15);
      color: var(--accent2);
      border: 1px solid rgba(var(--accent2-rgb), .3);
    }

    .btn-d:hover {
      background: rgba(var(--accent2-rgb), .25);
    }

    .btn-sm {
      padding: 5px 10px;
      font-size: .75rem;
    }

    #search-results {
      max-height: 360px;
      overflow-y: auto;
    }

    .si {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      transition: var(--t);
    }

    .si:last-child {
      border-bottom: none;
    }

    .si:hover {
      background: var(--surface2);
    }

    .scover {
      width: 42px;
      height: 42px;
      border-radius: 6px;
      object-fit: cover;
      background: var(--surface2);
      flex-shrink: 0;
    }

    .scover-ph {
      width: 42px;
      height: 42px;
      border-radius: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    .sinfo {
      flex: 1;
      min-width: 0;
    }

    .sname {
      font-size: .88rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .smeta {
      font-size: .74rem;
      color: var(--text2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sdur {
      font-size: .74rem;
      color: var(--text2);
      flex-shrink: 0;
    }

    .btn-add {
      background: rgba(var(--accent-rgb), .15);
      border: 1px solid rgba(var(--accent-rgb), .3);
      color: var(--accent);
      border-radius: 6px;
      padding: 5px 12px;
      font-size: .78rem;
      cursor: pointer;
      transition: var(--t);
      flex-shrink: 0;
    }

    .btn-add:hover {
      background: rgba(var(--accent-rgb), .3);
    }

    .btn-add:disabled {
      opacity: .5;
      cursor: not-allowed;
    }

    .tip {
      text-align: center;
      padding: 28px;
      color: var(--text2);
      font-size: .85rem;
    }

    .spin {
      width: 22px;
      height: 22px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 8px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    #queue-list {
      max-height: 490px;
      overflow-y: auto;
    }

    .qi {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      transition: var(--t);
    }

    .qi:last-child {
      border-bottom: none;
    }

    .qi.cur {
      background: rgba(var(--accent-rgb), .1);
      border-left: 3px solid var(--accent);
    }

    .qnum {
      width: 18px;
      text-align: center;
      font-size: .74rem;
      color: var(--text2);
      flex-shrink: 0;
    }

    .qnum.play {
      color: var(--accent);
    }

    .qcover {
      width: 36px;
      height: 36px;
      border-radius: 5px;
      object-fit: cover;
      background: var(--surface2);
      flex-shrink: 0;
    }

    .qcover-ph {
      width: 36px;
      height: 36px;
      border-radius: 5px;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .9rem;
      flex-shrink: 0;
    }

    .qinfo {
      flex: 1;
      min-width: 0;
    }

    .qname {
      font-size: .83rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .qsub {
      font-size: .71rem;
      color: var(--text2);
    }

    .qreq {
      font-size: .7rem;
      color: var(--accent);
      background: rgba(var(--accent-rgb), .1);
      border-radius: 4px;
      padding: 1px 6px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .btn-del {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text2);
      font-size: .88rem;
      padding: 4px;
      border-radius: 4px;
      transition: var(--t);
      flex-shrink: 0;
      display: none;
    }

    .adm .btn-del {
      display: block;
    }

    .btn-del:hover {
      color: var(--accent2);
    }

    .qempty {
      padding: 48px 20px;
      text-align: center;
      color: var(--text2);
      font-size: .85rem;
    }

    /* 拖拽排序样式 */
    .adm .qi:not(.cur) {
      cursor: grab;
    }

    .adm .qi:not(.cur):active {
      cursor: grabbing;
    }

    .qi.dragging {
      opacity: 0.4;
      background: rgba(var(--accent-rgb), .08);
    }

    .qi.drag-over {
      border-top: 2px solid var(--accent);
    }

    .qempty .bi {
      font-size: 3rem;
      margin-bottom: 12px;
    }

    #pbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 200;
      background: rgba(var(--bg-rgb), .96);
      backdrop-filter: blur(24px);
      border-top: 1px solid var(--border);
      padding: 12px 20px;
    }

    .pi {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .pcover {
      width: 50px;
      height: 50px;
      border-radius: 8px;
      object-fit: cover;
      background: var(--surface2);
      flex-shrink: 0;
      border: 1px solid var(--border);
    }

    .pinfo {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .pinfo-left {
      flex-shrink: 0;
      min-width: 0;
      max-width: 260px;
    }

    .pname {
      font-size: .88rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .partist {
      font-size: .74rem;
      color: var(--text2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .plyrics {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1px;
      height: 28px;
      overflow: hidden;
      border-left: 1px solid var(--border);
      padding-left: 16px;
      min-width: 0;
      position: relative;
    }

    .lyric-line {
      font-size: .76rem;
      color: var(--text3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.4;
      transition: opacity .3s ease;
      opacity: .6;
    }

    .lyric-expand-tip {
      font-size: .65rem;
      color: var(--text3);
      opacity: .5;
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      transition: opacity .3s;
      white-space: nowrap;
    }

    .lyric-cur {
      color: var(--accent);
      font-size: .78rem;
      opacity: 1;
    }

    .lyric-next {
      color: var(--text3);
    }

    /* 歌词全屏弹窗 */
    .lyric-modal {
      position: fixed;
      inset: 0;
      z-index: 600;
      background: rgba(var(--bg-rgb), .75);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0;
      animation: lyricFadeIn .3s ease;
    }

    .lyric-modal.show {
      display: flex;
    }

    @keyframes lyricFadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .lyric-modal-hd {
      width: 100%;
      max-width: 700px;
      padding: 20px 24px 0;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    .lyric-modal-cover {
      width: 64px;
      height: 64px;
      border-radius: 12px;
      object-fit: cover;
      border: 2px solid var(--border);
      box-shadow: 0 4px 24px rgba(0, 0, 0, .4);
    }

    .lyric-modal-info {
      flex: 1;
      min-width: 0;
    }

    .lyric-modal-name {
      font-size: 1.15rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .lyric-modal-artist {
      font-size: .82rem;
      color: var(--text2);
      margin-top: 2px;
    }

    .lyric-modal-close {
      background: rgba(255, 255, 255, .08);
      border: none;
      color: var(--text2);
      font-size: 1.4rem;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--t);
      flex-shrink: 0;
    }

    .lyric-modal-close:hover {
      background: rgba(255, 255, 255, .15);
      color: var(--text);
    }

    .lyric-modal-body {
      flex: 1;
      width: 100%;
      max-width: 700px;
      overflow-y: auto;
      padding: 24px 28px 40px;
      -webkit-overflow-scrolling: touch;
    }

    .lyric-modal-line {
      padding: 10px 0;
      font-size: 1rem;
      color: rgba(255, 255, 255, .25);
      line-height: 1.6;
      transition: all .35s ease;
      cursor: default;
      pointer-events: none;
    }

    .lyric-modal-line:hover {
      color: rgba(255, 255, 255, .45);
    }

    .lyric-modal-line.active {
      color: var(--accent);
      font-size: 1.15rem;
      font-weight: 500;
      text-shadow: 0 0 20px rgba(var(--accent-rgb), .35);
    }

    .lyric-modal-line.near {
      color: rgba(255, 255, 255, .5);
      font-size: 1.02rem;
    }

    .lyric-modal-empty {
      color: var(--text2);
      font-size: .92rem;
      text-align: center;
      padding: 60px 0;
    }

    .lyric-modal-bar {
      position: sticky;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 10;
      background: rgba(var(--bg-rgb), .6);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 10px 28px;
      display: flex;
      align-items: center;
      gap: 10px;
      max-width: 700px;
      width: 100%;
    }

    .lyric-modal-bar .pt {
      font-size: .78rem;
      color: var(--text2);
      flex-shrink: 0;
    }

    .lyric-modal-bar .pb {
      flex: 1;
      height: 3px;
      background: rgba(255, 255, 255, .08);
      cursor: default;
      pointer-events: none;
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
    }

    .lyric-modal-bar .pf {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      width: 0%;
    }

    .lyric-bar-tip {
      font-size: .7rem;
      color: var(--text2);
      text-align: center;
      padding: 4px 0 0;
      opacity: .5;
    }

    .pctrl {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .cbtn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text2);
      font-size: 1.15rem;
      padding: 6px;
      border-radius: 50%;
      transition: var(--t);
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cbtn:hover {
      color: var(--accent);
    }

    .cbtn.pbtn {
      background: var(--accent);
      color: #fff;
      font-size: .95rem;
      box-shadow: var(--glow);
    }

    .cbtn.pbtn:hover {

  <script>
    // ── 所有 API 调用走本地服务器（app.js 代理）──────────────────
    async function apiSearch(q, source = 'all') {
      const params = new URLSearchParams({ q, limit: 20 });
      if (source !== 'all') params.set('source', source);
      const r = await fetch(`/api/search?${params}`);
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    }
    async function apiSongUrl(id, source, name, artist) {
      const params = new URLSearchParams({ id, source: source || 'qq' });
      if (name) params.set('name', name);
      if (artist) params.set('artist', artist);
      const r = await fetch(`/api/song/url?${params}`);
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    }

    // ── Socket.io & 状态 ─────────────────────────────────────────
    let isAdmin = false;
    let state = { queue: [], currentIndex: -1, isPlaying: false, currentTime: 0 };
    let masterTimer = null;
    const socket = io();
    const ap = document.getElementById('ap');

    // ── 操作日志 ─────────────────────────────────────────
    let logPanelOpen = false;
    let logData = [];
    let lastLogCount = 0;

    function toggleLogPanel() {
      logPanelOpen = !logPanelOpen;
      document.getElementById('log-panel').classList.toggle('open', logPanelOpen);
      if (logPanelOpen) lastLogCount = logData.length; // 打开时重置未读
      updateLogBadge();
    }

    function updateLogBadge() {
      const unread = logData.length - lastLogCount;
      const badge = document.getElementById('log-badge');
      if (unread > 0) {
        badge.textContent = unread > 99 ? '99+' : unread;
        badge.classList.add('show');
      } else {
        badge.classList.remove('show');
      }
    }

    function renderLogs(logs) {
      logData = logs || [];
      const el = document.getElementById('log-list');
      if (!logData.length) { el.innerHTML = '<div class="log-empty">暂无记录</div>'; return; }
      el.innerHTML = logData.slice().reverse().map(l => {
        const t = new Date(l.time);
        const hh = String(t.getHours()).padStart(2, '0');
        const mm = String(t.getMinutes()).padStart(2, '0');
        const ss = String(t.getSeconds()).padStart(2, '0');
        return `<div class="log-item"><span class="log-time">${hh}:${mm}:${ss}</span><span class="log-action">[${l.action}]</span> <span class="log-nick">${esc(l.nickname)}</span> ${l.detail ? `<span class="log-detail">${esc(l.detail)}</span>` : ''}<span class="log-ip">${l.ip}</span></div>`;
      }).join('');
      if (logPanelOpen) {
        lastLogCount = logData.length;
        el.scrollTop = 0;
      }
      updateLogBadge();
    }

    // 监听操作日志
    socket.on('op_log', (logs) => renderLogs(logs));

    // 昵称 & IP
    let myIP = '';
    function getNick() {
      const custom = (document.getElementById('nk').value || '').trim();
      if (custom && custom !== myIPNick) return custom; // 用户手动改过昵称就用用户的
      return myIPNick || '匿名';
    }
    let myIPNick = '';
    socket.emit('join', {}, ({ ip }) => {
      myIP = ip || '';
      // 取最后两段作为后缀，如 192.168.1.121 → ***.121
      const parts = ip ? ip.split('.') : [];

      // 切换时显示/隐藏源筛选按钮

      // 清空搜索结果
      searchResults = [];
      document.getElementById('search-results').innerHTML = '<div class="tip">搜索歌曲后在这里点歌 🎶</div>';
    }

    // 搜索源筛选（仅 native 模式生效）
    document.querySelectorAll('.src-opt').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.src-opt').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        searchSource = btn.dataset.src;
      });

    document.getElementById('si').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

    async function doSearch() {
      const q = document.getElementById('si').value.trim();
      if (!q) return;
      const box = document.getElementById('search-results');
      const sbtn = document.getElementById('btn-search');
      box.innerHTML = '<div class="tip"><div class="spin"></div>搜索中…</div>';
      sbtn.disabled = true;

      try {
        if (searchTab === 'agg') {
          // 聚合搜索 —— 走后端代理（解决 CORS）
          const r = await fetch('/api/agg-search', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: q })
          });
          if (!r.ok) throw new Error('HTTP ' + r.status);
          const data = await r.json();
          if (data.code === 200 && Array.isArray(data.data) && data.data.length) {
            // API 返回 data 数组，每项字段：song_id, song_name, singer, cover_url, duration("mm:ss"), lyrics, mp3_url
            const songs = data.data.map(item => {
              let secs = 0;
              if (item.duration) {
                const parts = String(item.duration).split(':');
                secs = parts.length >= 2 ? parseInt(parts[0]) * 60 + parseInt(parts[1]) : 0;
              }
              return {
                id: String(item.song_id || ''),
                name: item.song_name || '',
                artist: item.singer || '',
                cover: item.cover_url || '',
                duration: secs * 1000,
                source: 'agg',
                lyrics: item.lyrics || '',
                _mp3Url: item.mp3_url || '',
              };
            });
            renderResults(songs);
          } else {
            box.innerHTML = '<div class="tip">' + esc(data.msg || '未找到相关歌曲，换个关键词试试 🎵') + '</div>';
          }
        } else {
          // 原有音乐搜索（QQ/网易云）
          const data = await apiSearch(q, searchSource);
          renderResults(data.songs || []);
          if (data.error) toast('⚠️ ' + data.error, 'warning');
        }
      } catch (e) {
        box.innerHTML = `<div class="tip">搜索失败：${esc(e.message)}<br/><small>请检查网络连接后重试</small></div>`;
      } finally {
        sbtn.disabled = false;
      }
    }

    // 存储搜索结果
    let searchResults = [];

    function renderResults(songs) {
      searchResults = songs;
      const box = document.getElementById('search-results');
      if (!songs.length) {
        box.innerHTML = '<div class="tip">没有找到相关歌曲，换个关键词试试 🎵</div>';
        return;
      }
      box.innerHTML = songs.map((s, i) => {
        // 来源标签样式映射
        let srcLabel = '', srcStyle = '';
        if (s.source === 'nc') { srcLabel = '网易云'; srcStyle = 'color:var(--nc-color);background:var(--hot-active-bg)'; }
        else if (s.source === 'qq') { srcLabel = 'QQ'; srcStyle = 'color:var(--qq-color);background:rgba(var(--accent-rgb),.1)'; }
        else if (s.source === 'agg') { srcLabel = '聚合'; srcStyle = 'color:var(--accent);background:rgba(var(--accent-rgb),.1)'; }
        return `
    <div class="si">
      ${s.cover
            ? `<img class="scover" src="${s.cover}" onerror="this.outerHTML='<div class=scover-ph>🎵</div>'" alt="">`
            : `<div class="scover-ph">🎵</div>`}
      <div class="sinfo">
        <div class="sname">${esc(s.name)}${s.needPay ? ' <span style="font-size:.68rem;color:#fbbf24;background:rgba(251,191,36,.12);border-radius:3px;padding:1px 5px;">VIP</span>' : ''} <span style="font-size:.6rem;${srcStyle};border-radius:3px;padding:1px 5px;">${srcLabel}</span></div>
        <div class="smeta">${esc(s.artist)}${s.album ? ' · ' + esc(s.album) : ''}</div>
      </div>
      ${s.duration ? `<div class="sdur">${fmt(s.duration)}</div>` : ''}
      <button class="btn-add" id="addbtn-${i}" onclick="addSong(${i})">＋ 点歌</button>
    </div>`;
      }).join('');
    }

    async function addSong(idx) {
      const song = searchResults[idx];
      if (!song) return;
      const btn = document.getElementById('addbtn-' + idx);
      btn.disabled = true; btn.textContent = '获取中…';

      try {
        let url;
        if (song.source === 'agg') {
          // 聚合搜索：直接用 API 返回的 mp3_url，通过后端代理播放（避免防盗链 403）
          if (!song._mp3Url) throw new Error('聚合源未返回播放链接');
          url = '/api/agg-proxy?url=' + encodeURIComponent(song._mp3Url);
        } else {
          // QQ/网易云：需后端获取播放链接
          const result = await apiSongUrl(song.id, song.source, song.name, song.artist);
          url = result.url;
          if (!url) throw new Error(result.error || '无法获取播放链接');
          if (result.from === 'itunes') toast('💡 国内源无版权，已通过 iTunes 播放预览版', 'info');
        }
        const nickname = document.getElementById('nk').value.trim() || '匿名';
        const songData = { ...song, url };
        // 聚合搜索的歌曲带歌词原文，映射到 _lyrics 传给后端保存
        if (song.source === 'agg' && song.lyrics) songData._lyrics = song.lyrics;
        socket.emit('add_song', { song: songData, nickname }, (res) => {
          if (!res.ok) {
            btn.disabled = false;
            btn.textContent = '＋ 点歌';
          }
        });
        btn.textContent = '✓ 已点';
      } catch (e) {
        console.log(JSON.stringify(e.message))
        toast('点歌失败：' + e.message, 'error');
        btn.disabled = false; btn.textContent = '＋ 点歌';
      }
    }

    // ── 队列渲染 ─────────────────────────────────────────────────

      <div class="qinfo"><div class="qname">${esc(s.name)}</div><div class="qsub">${esc(s.artist)}</div></div>

    // ── 拖拽排序 ─────────────────────────────────────────────────
    function initDragSort(container) {
      let dragSrcIndex = null;

      container.querySelectorAll('[draggable="true"]').forEach(el => {
        el.addEventListener('dragstart', function (e) {
          dragSrcIndex = parseInt(this.dataset.qi);
          this.classList.add('dragging');
          e.dataTransfer.effectAllowed = 'move';
          e.dataTransfer.setData('text/plain', dragSrcIndex);
        });

        el.addEventListener('dragend', function () {
          this.classList.remove('dragging');
          container.querySelectorAll('.qi').forEach(item => item.classList.remove('drag-over'));
          dragSrcIndex = null;
        });

        el.addEventListener('dragover', function (e) {
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
          // 清除其他元素的 drag-over
          container.querySelectorAll('.qi').forEach(item => item.classList.remove('drag-over'));
          this.classList.add('drag-over');
        });

        el.addEventListener('dragleave', function () {
          this.classList.remove('drag-over');
        });

        el.addEventListener('drop', function (e) {
          e.preventDefault();
          this.classList.remove('drag-over');
          const toIndex = parseInt(this.dataset.qi);
          if (dragSrcIndex !== null && dragSrcIndex !== toIndex) {
            socket.emit('reorder_queue', {
              fromIndex: dragSrcIndex,
              toIndex: toIndex,
              nickname: getNick(),
            });
          }
        });
      });
    }

    // ── 播放器 UI ────────────────────────────────────────────────
    function updatePlayerUI() {
      const cur = state.queue[state.currentIndex];
      document.getElementById('btn-play').textContent = state.isPlaying ? '⏸' : '▶';
      if (cur) {
        document.getElementById('pn').textContent = cur.name;
        document.getElementById('pa').textContent = cur.artist;
        document.getElementById('pc').src = cur.cover || '';

      } else {

        document.getElementById('pf').style.width = '0%';
        document.getElementById('tc').textContent = '0:00';
        document.getElementById('tt').textContent = '0:00';
        document.getElementById('lyric-cur').textContent = '';
        document.getElementById('lyric-next').textContent = '';
      }
    }

    // ── 歌词 ─────────────────────────────────────────────────
    let lyricLines = [];   // [{time, text}, ...]
    let lyricIdx = -1;     // 当前歌词行索引
    let lyricSongId = '';  // 当前歌词对应的歌曲 ID

    // 解析 LRC 格式歌词为 [{time, text}, ...]
    function parseLyricText(raw) {
      if (!raw || typeof raw !== 'string') return [];
      // 尝试解析 LRC 格式
      const lrcReg = /\[(\d{1,3}):(\d{2})(?:\.(\d{1,3}))?\](.*)/g;
      const lines = [];
      let m;
      while ((m = lrcReg.exec(raw)) !== null) {
        const min = parseInt(m[1], 10);
        const sec = parseInt(m[2], 10);
        const ms = m[3] ? parseInt(m[3].padEnd(3, '0'), 10) : 0;
        const time = min * 60 + sec + ms / 1000;
        const text = m[4].trim();
        if (text) lines.push({ time, text });
      }
      if (lines.length) {
        lines.sort((a, b) => a.time - b.time);
        return lines;
      }
      // 非 LRC 格式：按换行分割，无时间戳则平均分配时间
      const textLines = raw.split('\n').map(l => l.trim()).filter(Boolean);
      return textLines.map((text, i) => ({ time: i * 4, text })); // 每 4 秒一行
    }

    async function fetchLyric(id, source, lyricsRaw) {
      // 聚合搜索：歌词原文直接传入，解析即可
      if (source === 'agg' && lyricsRaw) {
        lyricLines = parseLyricText(lyricsRaw);
        lyricSongId = String(id);
        lyricIdx = -1;
        updateLyricUI(-1);
        return;
      }
      if (source !== 'nc') {
        lyricLines = [];
        lyricSongId = '';
        updateLyricUI(-1);
        return;
      }
      lyricSongId = ''; // 重置，确保每次都获取
      try {
        const r = await fetch(`/api/lyric?id=${id}&source=nc`);
        const data = await r.json();
        lyricLines = data.lines || [];
        lyricSongId = String(id);
        console.log('📜 歌词加载:', lyricLines.length, '行');
      } catch (e) {
        lyricLines = [];
        lyricSongId = '';
      }
      lyricIdx = -1;
      updateLyricUI(-1);
    }

    function updateLyricUI(idx) {
      const curEl = document.getElementById('lyric-cur');
      const nextEl = document.getElementById('lyric-next');
      const tipEl = document.getElementById('lyric-expand-tip');
      if (!lyricLines.length || idx < 0 || idx >= lyricLines.length) {
        curEl.textContent = '';
        nextEl.textContent = '';
        if (tipEl) tipEl.style.display = 'none';
        if (window._lyricFlyClear) window._lyricFlyClear();
        return;
      }
      curEl.textContent = lyricLines[idx].text;
      nextEl.textContent = (idx + 1 < lyricLines.length) ? lyricLines[idx + 1].text : '';
      if (tipEl) tipEl.style.display = 'block';
      // 歌词飞入特效
      if (window._lyricFlyTrigger) window._lyricFlyTrigger(lyricLines[idx].text);
      // 同步更新弹窗高亮
      if (document.getElementById('lyric-modal').classList.contains('show')) {
        renderLyricModal(idx);
      }
    }

    function findLyricLine(time) {
      if (!lyricLines.length) return -1;
      // 二分查找：找到最后一个 time <= currentTime 的行
      let lo = 0, hi = lyricLines.length - 1;
      while (lo < hi) {
        const mid = (lo + hi + 1) >> 1;
        if (lyricLines[mid].time <= time) lo = mid;
        else hi = mid - 1;
      }
      return lyricLines[lo].time <= time ? lo : -1;
    }

    // ── 歌词全屏弹窗 ──────────────────────────────────────
    let lyricModalOpen = false;
    let lyricModalScrollTimer = null;

    function openLyricModal() {
      const cur = state.queue[state.currentIndex];
      if (!cur) return;

      lyricModalOpen = true;
      const modal = document.getElementById('lyric-modal');
      modal.classList.add('show');

      // 填充歌曲信息
      document.getElementById('lyric-modal-name').textContent = cur.name;
      document.getElementById('lyric-modal-artist').textContent = cur.artist;
      document.getElementById('lyric-modal-cover').src = cur.cover || '';

      // 渲染歌词
      const body = document.getElementById('lyric-modal-body');
      if (!lyricLines.length) {
        body.innerHTML = '<div class="lyric-modal-empty">暂无歌词 🎵</div>';
        return;
      }

      body.innerHTML = lyricLines.map((l, i) => `
        <div class="lyric-modal-line" data-idx="${i}" onclick="seekToLyric(${i})">${esc(l.text)}</div>
      `).join('');

      // 等渲染完后滚动到当前行
      requestAnimationFrame(() => {
        renderLyricModal(lyricIdx);
      });
    }

    function closeLyricModal() {
      lyricModalOpen = false;
      document.getElementById('lyric-modal').classList.remove('show');
      if (lyricModalScrollTimer) {
        clearInterval(lyricModalScrollTimer);
        lyricModalScrollTimer = null;
      }
    }

    function renderLyricModal(activeIdx) {
      const body = document.getElementById('lyric-modal-body');
      const lines = body.querySelectorAll('.lyric-modal-line');
      if (!lines.length) return;

      lines.forEach((el, i) => {
        el.classList.remove('active', 'near');
        if (i === activeIdx) {
          el.classList.add('active');
        } else if (Math.abs(i - activeIdx) <= 2) {
          el.classList.add('near');
        }
      });

      // 自动滚动到当前行（居中）
      const activeEl = lines[activeIdx];
      if (activeEl) {
        // 用 data-idx 找到元素
        const target = body.querySelector(`[data-idx="${activeIdx}"]`);
        if (target) {
          target.scrollIntoView({ block: 'center', behavior: 'smooth' });
        }
      }
    }

    // 点击歌词行跳转到对应时间
    function seekToLyric(idx) {
      if (!isAdmin) return;
      if (lyricLines[idx]) {
        ap.currentTime = lyricLines[idx].time;
      }
    }

    // 弹窗进度条点击跳转
    function lyricSeekTo(e) {
      if (!isAdmin) return;
      const bar = e.currentTarget;
      const ratio = e.offsetX / bar.offsetWidth;
      if (ap.duration) ap.currentTime = ratio * ap.duration;
    }

    // 弹窗内进度条同步更新
    ap.addEventListener('timeupdate', () => {
      if (!lyricModalOpen) return;
      const d = ap.duration || (state.queue[state.currentIndex]?.duration || 1000) / 1000;
      document.getElementById('lm-pf').style.width = (ap.currentTime / d * 100).toFixed(1) + '%';
      document.getElementById('lm-tc').textContent = fmt(Math.floor(ap.currentTime * 1000));
      document.getElementById('lm-tt').textContent = d > 1 ? fmt(Math.floor(d * 1000)) : '0:00';
    });

    ap.addEventListener('timeupdate', () => {
      const cur = state.queue[state.currentIndex];
      if (!cur) return;
      const d = ap.duration || (cur.duration || 1000) / 1000;
      document.getElementById('pf').style.width = (ap.currentTime / d * 100).toFixed(1) + '%';
      document.getElementById('tc').textContent = fmt(Math.floor(ap.currentTime * 1000));
      // 歌词同步
      const newIdx = findLyricLine(ap.currentTime);
      if (newIdx !== lyricIdx) {
        lyricIdx = newIdx;
        updateLyricUI(lyricIdx);
      }
    });
    ap.addEventListener('ended', () => {
      updateLyricUI(-1);
      const cur = state.queue[state.currentIndex];
      if (cur) socket.emit('song_ended', { uid: cur.uid });
    });
    ap.addEventListener('error', () => {
      updateLyricUI(-1);
      if (!ap.src || ap.src === location.href) return;
      toast('⚠️ 当前歌曲无法播放，2秒后自动跳过', 'warning');
      setTimeout(() => {
        const cur = state.queue[state.currentIndex];
        if (cur) socket.emit('song_ended', { uid: cur.uid });
      }, 2000);
    });

    // 网络卡顿导致播放中断时自动恢复
    ap.addEventListener('stalled', () => {
      if (ap.src && state.isPlaying) {
        setTimeout(() => {
          if (ap.paused && state.isPlaying) ap.play().catch(() => { });
        }, 1500);
      }
    });
    ap.addEventListener('waiting', () => {
      if (ap.src && state.isPlaying) {
        setTimeout(() => {
          if (ap.paused && state.isPlaying) ap.play().catch(() => { });
        }, 3000);
      }
    });

    function seekTo(e) {
      if (!isAdmin) return;
      const r = e.offsetX / e.currentTarget.offsetWidth;
      if (ap.duration) ap.currentTime = r * ap.duration;
    }

    // ── 控制 ─────────────────────────────────────────────────────

    // ── 音量控制 ────────────────────────────────────────────────
    const volSlider = document.getElementById('vol-slider');
    const volIcon = document.getElementById('vol-icon');
    let lastVolume = 80;
    let isMuted = false;

    // 初始化音量
    const savedVol = localStorage.getItem('jk_vol');
    if (savedVol !== null) {
      volSlider.value = savedVol;
      ap.volume = savedVol / 100;
    } else {
      ap.volume = 0.8;
    }

    function setVolume(val) {
      const v = parseInt(val);
      ap.volume = v / 100;
      isMuted = v === 0;
      lastVolume = v > 0 ? v : lastVolume;
      updateVolIcon();
      localStorage.setItem('jk_vol', v);
    }

    function toggleMute() {
      if (isMuted) {
        ap.volume = lastVolume / 100;
        volSlider.value = lastVolume;
        isMuted = false;
      } else {
        lastVolume = parseInt(volSlider.value) || 80;
        ap.volume = 0;
        volSlider.value = 0;
        isMuted = true;
      }
      updateVolIcon();
    }

    function updateVolIcon() {
      const v = ap.volume;
      if (v === 0 || isMuted) volIcon.textContent = '🔇';
      else if (v < 0.4) volIcon.textContent = '🔈';
      else if (v < 0.7) volIcon.textContent = '🔉';
      else volIcon.textContent = '🔊';
    }

    // ── 工具 ─────────────────────────────────────────────────────
    function fmt(ms) { const s = Math.round(ms / 1000); return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`; }
    function esc(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
    function toast(msg, type = 'info') {
      const w = document.getElementById('tw');
      const t = document.createElement('div');
      t.className = 'toast ' + type; t.textContent = msg; w.appendChild(t);
      setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity .3s'; setTimeout(() => t.remove(), 300); }, 3500);
    }

    // 初始化昵称

      if (s) document.getElementById('nk').value = s;
      document.getElementById('nk').addEventListener('input', function () { localStorage.setItem('jk_nick', this.value); });
    })();

    // ── 主题切换 ─────────────────────────────────────────────────
    const THEMES = ['cyber', 'aurora', 'sakura'];
    const THEME_NAMES = { cyber: '赛博', aurora: '极光', sakura: '樱花' };
    const THEME_ICONS = { cyber: '🔮', aurora: '🌌', sakura: '🌸' };

    // 各主题对应的粒子调色板
    const THEME_PALETTE = {
      cyber: ['#a78bfa', '#7c5cfc', '#c084fc', '#e879f9', '#fc5c7d', '#fb7185', '#818cf8', '#ddd6fe'],
      aurora: ['#818cf8', '#6366f1', '#a78bfa', '#f472b6', '#8b5cf6', '#c4b5fd', '#38bdf8', '#e0e7ff'],
      sakura: ['#f9a8d4', '#f472b6', '#c084fc', '#e879f9', '#fda4af', '#f0abfc', '#d946ef', '#fce7f3'],
    };

    // 各主题对应的 Three.js 粒子颜色
    const THEME_PARTICLES = {
      cyber: {
        particle: [0.50, 0.35, 0.75],
        firefly: [0.80, 0.85, 1.0],
      },
      aurora: {
        particle: [0.40, 0.55, 0.95],
        firefly: [0.70, 0.75, 1.0],
      },
      sakura: {
        particle: [0.75, 0.50, 0.65],
        firefly: [1.0, 0.85, 0.92],
      },
    };

    // 点击爆炸粒子颜色
    const THEME_CLICK_COLORS = {
      cyber: ['#7c5cfc', '#fc5c7d', '#43e97b', '#38f9d7', '#ffd86f', '#ff8c42'],
      aurora: ['#818cf8', '#f472b6', '#34d399', '#38bdf8', '#a78bfa', '#fbbf24'],
      sakura: ['#f9a8d4', '#c084fc', '#86efac', '#fda4af', '#e879f9', '#f472b6'],
    };

    let currentTheme = localStorage.getItem('jk_theme') || 'aurora'; // 默认极光

    function applyTheme(theme) {
      currentTheme = theme;
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('jk_theme', theme);
      // 更新按钮
      document.getElementById('btn-theme').innerHTML = `${THEME_ICONS[theme]} <span class="theme-name">${THEME_NAMES[theme]}</span>`;
      // 通知粒子特效更新
      window._updateParticleTheme && window._updateParticleTheme(theme);
      window._updateClickTheme && window._updateClickTheme(theme);
      window._updateLyricPalette && window._updateLyricPalette(theme);
    }

    function toggleTheme() {
      const idx = THEMES.indexOf(currentTheme);
      const next = THEMES[(idx + 1) % THEMES.length];
      applyTheme(next);
    }

    // 页面加载时应用
    applyTheme(currentTheme);
  </script>

  <!-- ── 歌词沉浸特效（电影级重力错落掉落） ────────────────────── -->
  <canvas id="lyric-fly-canvas"
    style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;"></canvas>

  <!-- ── 歌词沉浸特效 ─────────────────────────────────────────── -->
  <script>
    (() => {
      const canvas = document.getElementById('lyric-fly-canvas');
      const ctx = canvas.getContext('2d');
      let W = canvas.width = window.innerWidth;
      let H = canvas.height = window.innerHeight;
      window.addEventListener('resize', () => { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; });

      // 主题色板（可通过主题切换更新）
      let PALETTE = ['#a78bfa', '#7c5cfc', '#c084fc', '#e879f9', '#fc5c7d', '#fb7185', '#818cf8', '#ddd6fe'];

      // ── easing ────────────────────────────────────────────────────
      function easeOutBack(t) {
        const c1 = 1.70158, c3 = c1 + 1;
        return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
      }
      function easeOutBounceLight(t) {
        if (t < 1 / 2.75) return 7.5625 * t * t;
        if (t < 2 / 2.75) { t -= 1.5 / 2.75; return 7.5625 * t * t + 0.75; }
        if (t < 2.5 / 2.75) { t -= 2.25 / 2.75; return 7.5625 * t * t + 0.9375; }
        t -= 2.625 / 2.75; return 7.5625 * t * t + 0.984375;
      }
      function easeGravity(t) {
        return t < 0.72
          ? easeOutBack(t / 0.72) * 0.96
          : 0.96 + easeOutBounceLight((t - 0.72) / 0.28) * 0.04;
      }

      // ── CharParticle ──────────────────────────────────────────────
      let charParticles = [];
      let activeText = '';
      let globalAlpha = 1;
      let phase = 'idle'; // idle | in | hold | fadeout
      let pendingText = null;
      let lastTime = 0;

      class CharParticle {
        constructor(char, targetX, targetY, fontSize, charIndex) {
          this.char = char;
          this.fontSize = fontSize;
          this.targetX = targetX;
          this.targetY = targetY;
          this.color = PALETTE[charIndex % PALETTE.length];

          // 从屏幕顶部区域错落高度开始掉落（长程飞落感）
          const dropH = targetY * 0.75 + charIndex * 18 + Math.random() * 80;
          this._startY = targetY - dropH;
          this.x = targetX + (Math.random() - 0.5) * 24;
          this.y = this._startY;

          // 时序延迟：逐字从左到右依次
          this.delay = charIndex * 0.036 + Math.random() * 0.016;
          this.duration = 0.50 + Math.random() * 0.14;
          this.elapsed = 0;
          this.progress = 0;

          this.initRot = (Math.random() - 0.5) * 0.28;
          this.rotation = this.initRot;

          this.breathPhase = Math.random() * Math.PI * 2;
          this.breathSpeed = 0.038 + Math.random() * 0.022;

          this.alpha = 0;
          this.settled = false;
        }

        update(dt) {
          this.delay -= dt;
          if (this.delay > 0) return;
          this.elapsed = Math.min(this.elapsed + dt, this.duration);
          this.progress = this.elapsed / this.duration;
          const t = easeGravity(this.progress);
          this.y = this._startY + t * (this.targetY - this._startY);
          this.x += (this.targetX - this.x) * 0.16;
          this.rotation = this.initRot * (1 - t);
          this.alpha = Math.min(1, this.progress / 0.28);
          if (this.progress >= 1) {
            this.settled = true;
            this.x = this.targetX;
            this.y = this.targetY;
            this.rotation = 0;
          }
          if (this.settled) this.breathPhase += this.breathSpeed;
        }

        draw(ctx, gAlpha) {
          if (this.delay > 0 || this.alpha <= 0) return;
          const breath = this.settled
            ? 0.80 + 0.20 * (0.5 + 0.5 * Math.sin(this.breathPhase))
            : 1;
          const fa = this.alpha * gAlpha * breath;
          if (fa <= 0.01) return;

          ctx.save();
          ctx.translate(this.x, this.y);
          ctx.rotate(this.rotation);
          ctx.font = `bold ${this.fontSize}px "PingFang SC","Microsoft YaHei",sans-serif`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';

          // 层1：大范围柔光光晕
          ctx.globalAlpha = fa * 0.22;
          ctx.shadowBlur = 44;
          ctx.shadowColor = this.color;
          ctx.fillStyle = this.color;
          ctx.fillText(this.char, 0, 0);

          // 层2：中光晕
          ctx.globalAlpha = fa * 0.55;
          ctx.shadowBlur = 18;
          ctx.fillText(this.char, 0, 0);

          // 层3：主体字形
          ctx.globalAlpha = fa;
          ctx.shadowBlur = 0;
          ctx.fillText(this.char, 0, 0);

          // 层4：白色高光（呼吸峰值时）
          if (this.settled && breath > 0.92) {
            ctx.globalAlpha = fa * (breath - 0.92) * 2.0;
            ctx.strokeStyle = 'rgba(255,255,255,0.50)';
            ctx.lineWidth = 0.5;
            ctx.strokeText(this.char, 0, 0);
          }
          ctx.restore();
        }
      }

      // ── triggerLyricFly ───────────────────────────────────────────
      function triggerLyricFly(text) {
        if (!text || !text.trim()) { phase = 'idle'; return; }
        text = text.trim();
        activeText = text;
        globalAlpha = 1;
        phase = 'in';
        charParticles = [];

        const fontSize = Math.min(46, Math.max(22, W / (text.length * 1.05 + 1.5)));
        ctx.font = `bold ${fontSize}px "PingFang SC","Microsoft YaHei",sans-serif`;
        const GAP = fontSize * 0.08;
        const charWidths = text.split('').map(c => ctx.measureText(c).width + GAP);
        const totalWidth = charWidths.reduce((a, b) => a + b, 0);
        const centerY = H * 0.82;
        let startX = (W - totalWidth) / 2;

        for (let i = 0; i < text.length; i++) {
          const targetX = startX + charWidths[i] / 2;
          charParticles.push(new CharParticle(text[i], targetX, centerY, fontSize, i));
          startX += charWidths[i];
        }
      }

      // ── 渲染主循环 ────────────────────────────────────────────────
      function loop(ts) {
        const dt = lastTime ? Math.min((ts - lastTime) / 1000, 0.05) : 0.016;
        lastTime = ts;
        ctx.clearRect(0, 0, W, H);

        // 淡出阶段
        if (phase === 'fadeout') {
          globalAlpha -= dt * 2.2; // ~0.45s 淡出
          if (globalAlpha <= 0) {
            globalAlpha = 0;
            charParticles = [];
            phase = 'idle';
            if (pendingText) {
              const txt = pendingText;
              pendingText = null;
              triggerLyricFly(txt);
            }
          }
        }

        // 检查是否全部落定
        if (phase === 'in' && charParticles.length && charParticles.every(p => p.settled)) {
          phase = 'hold';
        }

        // 有待播歌词且当前在 hold/in → 触发淡出
        if (pendingText && (phase === 'hold' || phase === 'in')) {
          phase = 'fadeout';
        }

        for (const p of charParticles) {
          p.update(dt);
          p.draw(ctx, globalAlpha);
        }

        requestAnimationFrame(loop);
      }
      requestAnimationFrame(loop);

      // ── 对外 API ──────────────────────────────────────────────────
      window._lyricFlyTrigger = function (text) {
        if (!text || !text.trim()) return;
        const t = text.trim();
        if (t === activeText && phase !== 'fadeout') return;
        if (phase === 'idle') {
          triggerLyricFly(t);
        } else {
          pendingText = t;
          if (phase === 'hold') phase = 'fadeout';
        }
      };
      window._lyricFlyClear = function () {
        pendingText = null;
        globalAlpha = 0;
        charParticles = [];
        phase = 'idle';
        activeText = '';
      };
      window._updateLyricPalette = function (theme) {
        const p = window.THEME_PALETTE && window.THEME_PALETTE[theme];
        if (p) PALETTE = [...p];
      };
    })();
  </script>

  <!-- ── 点击粒子爆炸效果 ─────────────────────────────────────── -->
  <canvas id="click-canvas"
    style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;"></canvas>
  <script>
    (() => {
      const canvas = document.getElementById('click-canvas');
      const ctx = canvas.getContext('2d');
      let W = canvas.width = window.innerWidth;
      let H = canvas.height = window.innerHeight;
      window.addEventListener('resize', () => { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; });

      let COLORS = ['#7c5cfc', '#fc5c7d', '#43e97b', '#38f9d7', '#ffd86f', '#ff8c42'];
      const particles = [];

      class Particle {
        constructor(x, y) {
          this.x = x;
          this.y = y;
          const angle = Math.random() * Math.PI * 2;
          const speed = 2 + Math.random() * 5;
          this.vx = Math.cos(angle) * speed;
          this.vy = Math.sin(angle) * speed;
          this.radius = 2 + Math.random() * 3;
          this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
          this.alpha = 1;
          this.decay = 0.018 + Math.random() * 0.02;
          this.gravity = 0.12;
        }
        update() {
          this.vx *= 0.96;
          this.vy *= 0.96;
          this.vy += this.gravity;
          this.x += this.vx;
          this.y += this.vy;
          this.alpha -= this.decay;
        }
        draw() {
          ctx.save();
          ctx.globalAlpha = Math.max(0, this.alpha);
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
          ctx.fillStyle = this.color;
          ctx.shadowBlur = 8;
          ctx.shadowColor = this.color;
          ctx.fill();
          ctx.restore();
        }
      }

      function spawnBurst(x, y, count = 22) {
        for (let i = 0; i < count; i++) particles.push(new Particle(x, y));
      }

      function loop() {
        ctx.clearRect(0, 0, W, H);
        for (let i = particles.length - 1; i >= 0; i--) {
          particles[i].update();
          particles[i].draw();
          if (particles[i].alpha <= 0) particles.splice(i, 1);
        }
        requestAnimationFrame(loop);
      }
      loop();

      document.addEventListener('click', e => spawnBurst(e.clientX, e.clientY));

      window._updateClickTheme = function (theme) {
        const c = window.THEME_CLICK_COLORS && window.THEME_CLICK_COLORS[theme];
        if (c) COLORS = [...c];
      };
    })();
  </script>
</body>
